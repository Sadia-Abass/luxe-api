name: Build, Test, Deploy to SmarterASP.NET

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest   # no Web Deploy step yet, so we don't need Windows for CI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Frontend (React) ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install client dependencies
        working-directory: ./luxe/luxe.client
        run: npm ci

      - name: Build React app
        working-directory: ./luxe/luxe.client
        run: npm run build

      # ---------- Backend (ASP.NET Core) ----------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: ./luxe/luxe.Server
        run: dotnet restore

      - name: Build
        working-directory: ./luxe/luxe.Server
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        working-directory: ./luxe/luxe.tests
        run: dotnet test --configuration Release
